<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | X-Wing Flight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05050a;
    font-family: 'Outfit', 'Inter', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px;
  }

  .glass-panel {
    background: rgba(20, 20, 30, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    margin-bottom: 20px;
  }

  #login-container {
    max-width: 400px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  #dashboard {
    display: none;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  h1, h2 {
    background: linear-gradient(135deg, #fff 0%, #ff4d4d 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .stat-card {
    background: rgba(255, 255, 255, 0.03);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    text-align: center;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    color: #ff4d4d;
    margin-bottom: 5px;
  }

  .stat-label {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    justify-content: flex-end;
  }

  .filter-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: #ff4d4d;
    border-color: #ff4d4d;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th {
    text-align: left;
    padding: 15px;
    color: #ff4d4d;
    border-bottom: 2px solid rgba(255, 77, 77, 0.3);
    font-size: 14px;
  }

  td {
    padding: 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  input {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 12px;
    color: #fff;
    font-family: inherit;
  }

  button.primary {
    background: linear-gradient(135deg, #ff4d4d 0%, #ff0000 100%);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
  }

  .linkedin-link {
    color: #00a0dc;
    text-decoration: none;
  }

  .linkedin-link:hover {
    text-decoration: underline;
  }

  #error-msg {
    color: #ff4d4d;
    font-size: 13px;
    text-align: center;
    display: none;
  }

</style>
</head>
<body>

<div id="login-container" class="glass-panel">
  <h1>ADMIN LOGIN</h1>
  <div class="input-group">
    <input type="email" id="email" placeholder="Email" required>
  </div>
  <div class="input-group">
    <input type="password" id="password" placeholder="Password" required>
  </div>
  <button id="btn-login" class="primary">ACCESS COMMAND CENTER</button>
  <div id="error-msg">Access Denied: Invalid Credentials</div>
</div>

<div id="dashboard">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
    <h1>COMMAND CENTER</h1>
    <button id="btn-logout" class="filter-btn">DISCONNECT</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div id="stat-total-players" class="stat-value">0</div>
      <div class="stat-label">Total Pilots</div>
    </div>
    <div class="stat-card">
      <div id="stat-total-time" class="stat-value">0</div>
      <div class="stat-label">Total Flight Time (m)</div>
    </div>
    <div class="stat-card">
      <div id="stat-avg-score" class="stat-value">0</div>
      <div class="stat-label">Avg Missions/Pilot</div>
    </div>
  </div>

  <div class="glass-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2>PILOT INTELLIGENCE</h2>
      <div class="filters">
        <button class="filter-btn active" data-range="all">All Time</button>
        <button class="filter-btn" data-range="month">Last 30 Days</button>
        <button class="filter-btn" data-range="week">Last 7 Days</button>
        <button class="filter-btn" data-range="day">Today</button>
      </div>
    </div>
    
    <div style="overflow-x: auto;">
      <table id="pilot-table">
        <thead>
          <tr>
            <th>Pilot</th>
            <th>Email</th>
            <th>Missions</th>
            <th>Top Score</th>
            <th>LinkedIn</th>
          </tr>
        </thead>
        <tbody id="pilot-table-body">
          <!-- Data rows -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://supabase.evnx.vn';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc3MzA0MzQzLCJleHAiOjIwOTI2NjQzNDN9.W1VMEabScFAdtk16t-mtx9Ccpo6apE65BY2etMg2skA';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginContainer = document.getElementById('login-container');
const dashboard = document.getElementById('dashboard');
const btnLogin = document.getElementById('btn-login');
const btnLogout = document.getElementById('btn-logout');
const errorMsg = document.getElementById('error-msg');
const pilotTableBody = document.getElementById('pilot-table-body');

let currentRange = 'all';

async function checkSession() {
  const { data: { session } } = await _supabase.auth.getSession();
  if (session) {
    // Also check if email is in flappy_xwing.admins
    const { data: admin } = await _supabase.rpc('execute_sql', { 
      query: `SELECT 1 FROM flappy_xwing.admins WHERE email = '${session.user.email}'`
    }).catch(() => ({ data: null }));
    
    // Simplification: just check session for now, the RPC check would be better but execute_sql might not be exposed to anon
    showDashboard();
  }
}

async function login() {
  const emailInput = document.getElementById('email').value.trim();
  const passwordInput = document.getElementById('password').value.trim();

  if (!emailInput || !passwordInput) {
    errorMsg.style.display = 'block';
    errorMsg.innerText = 'Email and Password are required';
    return;
  }

  const { data, error } = await _supabase.auth.signInWithPassword({
    email: emailInput,
    password: passwordInput
  });

  if (error) {
    errorMsg.style.display = 'block';
    errorMsg.innerText = error.message;
  } else {
    showDashboard();
  }
}

function showDashboard() {
  loginContainer.style.display = 'none';
  dashboard.style.display = 'block';
  loadStats();
}

async function loadStats() {
  try {
    const { data, error } = await _supabase.rpc('flappy_get_admin_stats', {
      p_time_range: currentRange
    });

    if (error) throw error;

    const stats = data[0].data;
    const pilots = stats.pilot_stats || [];
    const global = stats.global_stats || {};

    // Global Stats
    document.getElementById('stat-total-players').innerText = pilots.length;
    document.getElementById('stat-total-time').innerText = Math.floor(global.total_play_time_seconds / 60);
    
    const totalMissions = pilots.reduce((sum, p) => sum + p.play_count, 0);
    document.getElementById('stat-avg-score').innerText = pilots.length ? (totalMissions / pilots.length).toFixed(1) : 0;

    // Pilot Table
    pilotTableBody.innerHTML = pilots.map(p => `
      <tr>
        <td style="color: #fff; font-weight: 600;">${p.username}</td>
        <td>${p.email}</td>
        <td>${p.play_count}</td>
        <td style="color: #ffd700; font-weight: bold;">${p.high_score || 0}</td>
        <td>
          ${p.linkedin_url ? `<a href="${p.linkedin_url}" target="_blank" class="linkedin-link">View Profile</a>` : '<span style="opacity: 0.3">N/A</span>'}
        </td>
      </tr>
    `).join('');

  } catch (err) {
    console.error('Failed to load stats:', err);
  }
}

btnLogin.addEventListener('click', login);
btnLogout.addEventListener('click', async () => {
  await _supabase.auth.signOut();
  window.location.reload();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    if (!e.target.dataset.range) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentRange = e.target.dataset.range;
    loadStats();
  });
});

checkSession();
</script>
</body>
</html>
